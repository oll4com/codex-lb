name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate patch scripts
        run: python -m py_compile patch-*.py

      - name: Validate shell helpers
        run: |
          bash -n upgrade-and-verify.sh
          bash -n verify-compat.sh
